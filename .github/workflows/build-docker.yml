name: Build and push base images

on:
  workflow_call:
    inputs:
      push_images:
        description: "Whether built images should be pushed to the registry"
        required: true
        type: boolean

jobs:
  build-nvidia-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Pre-create BuildKit volume on /mnt
        run: |
          sudo mkdir -p /mnt/buildkit-state
          sudo docker volume create \
            --driver local \
            --opt type=none \
            --opt device=/mnt/buildkit-state \
            --opt o=bind \
            buildx_buildkit_ci0_state
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: ci
      - name: Log in to registry
        if: ${{ inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build nvidia-cache
        uses: docker/bake-action@v6
        with:
          push: ${{ inputs.push_images }}
          targets: nvidia-cache

  build-public-images:
    needs: [build-nvidia-cache]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [cpu-core, amd-core, nvidia-core, nvidia-full]
    steps:
      - uses: actions/checkout@v4
      - name: Pre-create BuildKit volume on /mnt
        run: |
          sudo mkdir -p /mnt/buildkit-state
          sudo docker volume create \
            --driver local \
            --opt type=none \
            --opt device=/mnt/buildkit-state \
            --opt o=bind \
            buildx_buildkit_ci0_state
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: ci
      - name: Log in to registry
        if: ${{ inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.target }}
        uses: docker/bake-action@v6
        with:
          push: ${{ inputs.push_images }}
          targets: ${{ matrix.target }}
